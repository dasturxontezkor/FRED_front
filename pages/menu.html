<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FR3D – Menu</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --white-color:#ffffff; --primary-color:#535da1; --secondary-color:#14B789;
  --section-bg-color:#f9f9f9; --dark-color:#000000; --p-color:#717275;
  --border-color:#e9eaeb; --featured-border-color:#727aab;
  --nav-width:240px; --topbar-height:64px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
body{background:var(--section-bg-color);color:var(--dark-color);transition:background 0.3s,color 0.3s;}

.page-loader{position:fixed;inset:0;background:var(--primary-color);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;opacity:1;transition:opacity 0.4s ease;}
.page-loader.hide{opacity:0;pointer-events:none;}
.loader-logo{color:#fff;font-size:36px;font-weight:800;letter-spacing:3px;margin-bottom:28px;}
.loader-logo span{color:var(--secondary-color);}
.loader-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.sidebar{display:none;}
@media(min-width:768px){
  .sidebar{display:flex;flex-direction:column;position:fixed;top:0;left:0;width:var(--nav-width);height:100vh;background:var(--primary-color);padding:28px 0;z-index:100;box-shadow:4px 0 20px rgba(83,93,161,0.15);}
  .sidebar-logo{color:#fff;font-size:26px;font-weight:800;letter-spacing:2px;padding:0 28px 32px;border-bottom:1px solid rgba(255,255,255,0.15);cursor:pointer;user-select:none;transition:opacity 0.2s;}
  .sidebar-logo:hover{opacity:0.85;}
  .sidebar-logo span{color:var(--secondary-color);}
  .sidebar-nav{flex:1;padding:24px 0;display:flex;flex-direction:column;gap:4px;}
  .nav-item-side{display:flex;align-items:center;gap:14px;padding:13px 28px;color:rgba(255,255,255,0.65);font-size:14px;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all 0.2s;text-decoration:none;}
  .nav-item-side i{font-size:17px;width:20px;text-align:center;}
  .nav-item-side:hover{background:rgba(255,255,255,0.08);color:#fff;}
  .nav-item-side.active{background:rgba(255,255,255,0.12);color:#fff;border-left:3px solid var(--secondary-color);}
  .main-content{margin-left:var(--nav-width);}
  .bottom-nav{display:none!important;}
}

.topbar{background:#fff;padding:0 20px;height:var(--topbar-height);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-color);position:sticky;top:0;z-index:50;gap:12px;}
.topbar-logo{color:var(--primary-color);font-weight:800;font-size:22px;letter-spacing:2px;cursor:pointer;user-select:none;white-space:nowrap;transition:opacity 0.2s;}
.topbar-logo:hover{opacity:0.8;}
.topbar-logo span{color:var(--secondary-color);}
@media(min-width:768px){.topbar-logo{display:none;}}
.topbar-title{font-size:16px;font-weight:700;color:var(--dark-color);display:none;}
@media(min-width:768px){.topbar-title{display:block;}}
.topbar-actions{display:flex;align-items:center;gap:6px;}
.action-btn{width:38px;height:38px;border-radius:50%;background:var(--section-bg-color);border:1px solid var(--border-color);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--p-color);transition:all 0.2s;font-size:15px;}
.action-btn:hover{background:var(--primary-color);color:#fff;border-color:var(--primary-color);}
.action-btn.logout-btn:hover{background:#e74c3c;border-color:#e74c3c;}

.page{padding:28px 20px 100px;max-width:720px;}
@media(min-width:768px){.page{padding:32px 36px 60px;}}
.page-header{margin-bottom:24px;}
.page-header h2{font-size:24px;font-weight:800;color:var(--dark-color);}
.page-header p{font-size:13px;color:var(--p-color);margin-top:4px;}

.level-list{display:flex;flex-direction:column;gap:12px;}

/* Level skeleton */
.level-skeleton{background:#fff;border-radius:20px;padding:18px 20px;border:1px solid var(--border-color);display:flex;align-items:center;gap:14px;}
.skel-circle{width:44px;height:44px;border-radius:14px;background:#eee;flex-shrink:0;}
.skel-lines{flex:1;}
.skel-line{height:10px;background:#eee;border-radius:6px;margin-bottom:8px;}
.skel-line.short{width:55%;margin-bottom:0;}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:0.4}}
.shimmer{animation:shimmer 1.2s ease infinite;}

.level-card{background:#fff;border:1px solid var(--border-color);border-radius:20px;overflow:hidden;transition:box-shadow 0.2s;}
.level-card:hover{box-shadow:0 6px 24px rgba(83,93,161,0.1);}
.level-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;cursor:pointer;user-select:none;transition:background 0.2s;}
.level-header:hover{background:rgba(83,93,161,0.03);}
.level-left{display:flex;align-items:center;gap:14px;}

/* Level badge - DB dan kelgan id ga qarab rang belgilanadi */
.level-badge{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.lvl-c1{background:rgba(20,183,137,0.12);color:var(--secondary-color);}
.lvl-c2{background:rgba(83,93,161,0.12);color:var(--primary-color);}
.lvl-c3{background:rgba(114,122,171,0.12);color:var(--featured-border-color);}
.lvl-c4{background:rgba(255,159,67,0.12);color:#ff9f43;}

.level-info h3{font-size:15px;font-weight:700;color:var(--dark-color);}
.level-info p{font-size:12px;color:var(--p-color);margin-top:2px;}
.level-right{display:flex;align-items:center;gap:10px;}
.level-count{background:var(--section-bg-color);border:1px solid var(--border-color);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--p-color);}
.level-arrow{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--section-bg-color);color:var(--p-color);font-size:13px;transition:all 0.3s;}
.level-card.open .level-arrow{background:var(--primary-color);color:#fff;transform:rotate(180deg);}

.level-body{max-height:0;overflow:hidden;transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1);}
.level-card.open .level-body{max-height:2000px;}
.level-body-inner{border-top:1px solid var(--border-color);padding:8px 0;}

/* Test skeleton */
.test-skeleton{display:flex;align-items:center;gap:12px;padding:12px 20px;}
.skel-icon{width:38px;height:38px;border-radius:11px;background:#eee;flex-shrink:0;}

.test-item{display:flex;align-items:center;gap:14px;padding:12px 20px;cursor:pointer;text-decoration:none;transition:background 0.15s;border-bottom:1px solid rgba(0,0,0,0.04);color:var(--dark-color);}
.test-item:last-child{border-bottom:none;}
.test-item:hover{background:rgba(83,93,161,0.04);}
.test-item.locked{cursor:not-allowed;opacity:0.55;}
.test-icon{width:38px;height:38px;border-radius:11px;background:rgba(83,93,161,0.08);color:var(--primary-color);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.test-icon.done{background:rgba(20,183,137,0.1);color:var(--secondary-color);}
.test-icon.locked{background:rgba(0,0,0,0.05);color:var(--p-color);}
.test-info{flex:1;}
.test-name{font-size:13px;font-weight:600;color:var(--dark-color);}
.test-meta{font-size:11px;color:var(--p-color);margin-top:2px;}
.test-right{display:flex;align-items:center;gap:8px;}
.test-status{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.status-new{background:rgba(20,183,137,0.1);color:var(--secondary-color);}
.status-done{background:rgba(83,93,161,0.1);color:var(--primary-color);}
.status-locked{background:rgba(0,0,0,0.05);color:var(--p-color);}
.test-arrow{font-size:12px;color:var(--p-color);}

.test-empty{padding:28px 20px;text-align:center;color:var(--p-color);font-size:13px;}
.test-empty i{font-size:28px;opacity:0.3;display:block;margin-bottom:8px;}

.error-box{border-radius:16px;padding:20px;text-align:center;font-size:13px;background:#fff0f0;border:1px solid #ffd0d0;color:#c0392b;}
.error-box i{font-size:26px;opacity:0.5;display:block;margin-bottom:8px;}
.retry-btn{margin-top:12px;padding:8px 20px;background:var(--primary-color);color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;}
.retry-btn:hover{opacity:0.88;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:20px;padding:32px 28px;width:90%;max-width:360px;text-align:center;transform:scale(0.9);transition:transform 0.25s;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal-overlay.show .modal{transform:scale(1);}
.modal-icon{width:60px;height:60px;background:rgba(231,76,60,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;color:#e74c3c;}
.modal h3{font-size:18px;font-weight:700;margin-bottom:8px;}
.modal p{font-size:13px;color:var(--p-color);margin-bottom:24px;}
.modal-btns{display:flex;gap:10px;}
.modal-btns button{flex:1;padding:11px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s;}
.btn-cancel{background:var(--section-bg-color);border:1px solid var(--border-color)!important;color:var(--p-color);}
.btn-cancel:hover{background:var(--border-color);}
.btn-logout-modal{background:#e74c3c;color:#fff;}
.btn-logout-modal:hover{background:#c0392b;}

.bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;justify-content:space-around;padding:10px 0 14px;border-top:1px solid var(--border-color);z-index:100;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--p-color);cursor:pointer;padding:6px 18px;border-radius:12px;transition:all 0.2s;text-decoration:none;}
.nav-item i{font-size:20px;}
.nav-item.active{color:var(--primary-color);background:rgba(83,93,161,0.08);}

body.dark{background:#0f0f14;color:#fff;--section-bg-color:#1a1a24;--border-color:#2a2a38;--dark-color:#ffffff;--p-color:#8888aa;}
body.dark .topbar,body.dark .level-card,body.dark .level-skeleton,body.dark .bottom-nav,body.dark .modal{background:#1a1a24;border-color:#2a2a38;}
body.dark .action-btn{background:#111118;border-color:#2a2a38;color:#8888aa;}
body.dark .sidebar{background:#12121c;}
body.dark .test-item{color:#fff;}
body.dark .skel-icon,body.dark .skel-circle,body.dark .skel-line{background:#2a2a38;}
body.dark .level-arrow,body.dark .level-count{background:#111118;border-color:#2a2a38;}
body.dark .btn-cancel{background:#111118;border-color:#2a2a38!important;color:#8888aa;}
body.dark .error-box{background:#1a1a24;border-color:#3a2a2a;color:#ff8080;}
</style>
</head>
<body>

<div class="page-loader" id="pageLoader">
  <div class="loader-logo">FR<span>3D</span></div>
  <div class="loader-spinner"></div>
</div>

<div class="modal-overlay" id="logoutModal">
  <div class="modal">
    <div class="modal-icon"><i class="fa fa-right-from-bracket"></i></div>
    <h3>Chiqmoqchimisiz?</h3>
    <p>Hisobingizdan chiqib ketasiz.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeLogout()">Bekor qilish</button>
      <button class="btn-logout-modal" onclick="confirmLogout()">Chiqish</button>
    </div>
  </div>
</div>

<aside class="sidebar">
  <div class="sidebar-logo" onclick="triggerLoad()">FR<span>3D</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item-side"><i class="fa fa-table-cells"></i> Dashboard</a>
    <a href="menu.html"      class="nav-item-side active"><i class="fa fa-layer-group"></i> Menu</a>
    <a href="profile.html"   class="nav-item-side"><i class="fa fa-user"></i> Profile</a>
    <a href="settings.html"  class="nav-item-side"><i class="fa fa-gear"></i> Settings</a>
  </nav>
  <div class="nav-item-side" style="margin-top:auto;border-top:1px solid rgba(255,255,255,0.1);padding-top:20px;" onclick="openLogout()">
    <i class="fa fa-right-from-bracket"></i> Logout
  </div>
</aside>

<div class="main-content">
  <div class="topbar">
    <div class="topbar-logo" onclick="triggerLoad()">FR<span>3D</span></div>
    <div class="topbar-title">📚 English Levels</div>
    <div class="topbar-actions">
      <div class="action-btn" onclick="toggleDark()"><i class="fa fa-moon" id="darkIcon"></i></div>
      <div class="action-btn logout-btn" onclick="openLogout()"><i class="fa fa-right-from-bracket"></i></div>
    </div>
  </div>

  <div class="page">
    <div class="page-header">
      <h2>📚 English Levels</h2>
      <p>O'z darajangizni tanlang va testlarni boshlang</p>
    </div>
    <div class="level-list" id="levelList"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><i class="fa fa-table-cells"></i>Dashboard</a>
  <a href="menu.html"      class="nav-item active"><i class="fa fa-layer-group"></i>Menu</a>
  <a href="profile.html"   class="nav-item"><i class="fa fa-user"></i>Profile</a>
  <a href="settings.html"  class="nav-item"><i class="fa fa-gear"></i>Settings</a>
</nav>

<script>
/* ════════════════════════════════════════════════
   ⚙️  CONFIG  —  faqat shu yerni o'zgartiring
   ════════════════════════════════════════════════ */
var API_BASE = "https://fr3dbg-production.up.railway.app";

/*
  Level badge rangi va ikoni — DB dagi tartib (id yoki index) ga qarab
  Agar sizning levelllaringiz id=1,2,3,4 bo'lsa ishlaydi.
  Ko'proq level bo'lsa oxirgi rang takrorlanadi.
*/
var LEVEL_STYLE = [
  { colorClass:"lvl-c1", icon:"fa-seedling" },
  { colorClass:"lvl-c2", icon:"fa-leaf"     },
  { colorClass:"lvl-c3", icon:"fa-tree"     },
  { colorClass:"lvl-c4", icon:"fa-star"     }
];

function getLevelStyle(index) {
  return LEVEL_STYLE[index % LEVEL_STYLE.length];
}

/* ════════════════════════════════════════════════
   🌐  API  —  GET /api/levels
                GET /api/levels/{id}/tests
                GET /api/tests/{id}
                POST /api/tests/{id}/submit
   ════════════════════════════════════════════════ */
async function apiFetch(path, options) {
  var token = localStorage.getItem("token");
  var headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = "Bearer " + token;

  var res = await fetch(API_BASE + path, Object.assign({ headers: headers }, options || {}));

  if (res.status === 401) {
    localStorage.clear();
    window.location.href = "../auth/login.html";
    return null;
  }
  if (!res.ok) {
    var text = await res.text();
    throw new Error(text || "Server xatolik " + res.status);
  }
  return res.json();
}

/* ════════════════════════════════════════════════
   🎨  RENDER — Levellar (API dan)
   Backend: GET /api/levels → { "levels": [ {id, name, description}, ... ] }
   ════════════════════════════════════════════════ */
function showLevelSkeletons() {
  document.getElementById("levelList").innerHTML =
    [1,2,3,4].map(function() {
      return (
        '<div class="level-skeleton shimmer">' +
          '<div class="skel-circle"></div>' +
          '<div class="skel-lines">' +
            '<div class="skel-line"></div>' +
            '<div class="skel-line short"></div>' +
          '</div>' +
        '</div>'
      );
    }).join('');
}

function renderLevels(levels) {
  var container = document.getElementById("levelList");

  if (!levels || levels.length === 0) {
    container.innerHTML =
      '<div class="error-box">' +
        '<i class="fa fa-inbox"></i>' +
        'Hozircha levellar mavjud emas' +
      '</div>';
    return;
  }

  container.innerHTML = levels.map(function(lvl, index) {
    var style = getLevelStyle(index);
    return (
      '<div class="level-card" id="card-' + lvl.id + '">' +
        '<div class="level-header" onclick="toggleLevel(' + lvl.id + ')">' +
          '<div class="level-left">' +
            '<div class="level-badge ' + style.colorClass + '">' +
              '<i class="fa ' + style.icon + '"></i>' +
            '</div>' +
            '<div class="level-info">' +
              '<h3>' + (lvl.name || "Level " + lvl.id) + '</h3>' +
              '<p>' + (lvl.description || "") + '</p>' +
            '</div>' +
          '</div>' +
          '<div class="level-right">' +
            '<div class="level-count" id="count-' + lvl.id + '">— test</div>' +
            '<div class="level-arrow"><i class="fa fa-chevron-down"></i></div>' +
          '</div>' +
        '</div>' +
        '<div class="level-body" id="body-' + lvl.id + '">' +
          '<div class="level-body-inner" id="inner-' + lvl.id + '"></div>' +
        '</div>' +
      '</div>'
    );
  }).join('');
}

/* ════════════════════════════════════════════════
   🔄  ACCORDION — toggle level
   ════════════════════════════════════════════════ */
var loadedLevels = {};

async function toggleLevel(levelId) {
  var card   = document.getElementById("card-" + levelId);
  var isOpen = card.classList.contains("open");

  document.querySelectorAll(".level-card.open").forEach(function(c) {
    c.classList.remove("open");
  });

  if (isOpen) return;

  card.classList.add("open");

  if (loadedLevels[levelId]) return;

  showTestSkeletons(levelId);

  try {
    /*
      GET /api/levels/{levelId}/tests
      Response: { "tests": [ {id, name, questions, time, status}, ... ] }
    */
    var data = await apiFetch("/api/levels/" + levelId + "/tests");
    if (!data) return;

    var tests = data.tests || [];
    renderTests(levelId, tests);
    document.getElementById("count-" + levelId).textContent = tests.length + " test";
    loadedLevels[levelId] = true;

  } catch(err) {
    document.getElementById("inner-" + levelId).innerHTML =
      '<div class="test-empty">' +
        '<i class="fa fa-triangle-exclamation"></i>' +
        'Xatolik: ' + err.message + '<br><br>' +
        '<button class="retry-btn" onclick="retryTests(' + levelId + ')">' +
          '<i class="fa fa-rotate-right"></i> Qayta urinish' +
        '</button>' +
      '</div>';
  }
}

async function retryTests(levelId) {
  loadedLevels[levelId] = false;
  var card = document.getElementById("card-" + levelId);
  card.classList.add("open");
  showTestSkeletons(levelId);
  try {
    var data = await apiFetch("/api/levels/" + levelId + "/tests");
    if (!data) return;
    var tests = data.tests || [];
    renderTests(levelId, tests);
    document.getElementById("count-" + levelId).textContent = tests.length + " test";
    loadedLevels[levelId] = true;
  } catch(err) {
    document.getElementById("inner-" + levelId).innerHTML =
      '<div class="test-empty"><i class="fa fa-triangle-exclamation"></i>Xatolik: ' + err.message + '</div>';
  }
}

/* ════════════════════════════════════════════════
   🃏  TEST KARTALAR
   Backend TestDTO: { id, name, questions, time, status }
       status → "new" | "done" | "locked"
   ════════════════════════════════════════════════ */
function renderTests(levelId, tests) {
  var inner = document.getElementById("inner-" + levelId);

  if (!tests || tests.length === 0) {
    inner.innerHTML =
      '<div class="test-empty">' +
        '<i class="fa fa-inbox"></i>Hozircha testlar mavjud emas' +
      '</div>';
    return;
  }

  var statusLabel = { new:"Yangi", done:"Bajarildi", locked:"Qulflangan" };
  var statusIcon  = { new:"fa-play", done:"fa-check", locked:"fa-lock" };

  inner.innerHTML = tests.map(function(t) {
    var st       = t.status || "new";
    var isLocked = st === "locked";
    /*
      Test sahifasiga o'tish: test.html?id={testId}
      U yerda: GET /api/tests/{id} → savollar
               POST /api/tests/{id}/submit → natija
    */
    var href = isLocked ? "#" : ("test.html?id=" + t.id);

    return (
      '<a class="test-item ' + (isLocked ? "locked" : "") + '" ' +
          'href="' + href + '" ' +
          (isLocked ? 'onclick="return false"' : '') + '>' +
        '<div class="test-icon ' + st + '">' +
          '<i class="fa ' + (statusIcon[st] || "fa-play") + '"></i>' +
        '</div>' +
        '<div class="test-info">' +
          '<div class="test-name">' + (t.name || "Test") + '</div>' +
          '<div class="test-meta">' + (t.questions || 0) + ' savol · ' + (t.time || "—") + '</div>' +
        '</div>' +
        '<div class="test-right">' +
          '<span class="test-status status-' + st + '">' + (statusLabel[st] || st) + '</span>' +
          (!isLocked ? '<i class="fa fa-chevron-right test-arrow"></i>' : '') +
        '</div>' +
      '</a>'
    );
  }).join('');
}

function showTestSkeletons(levelId) {
  document.getElementById("inner-" + levelId).innerHTML =
    [1,2,3].map(function() {
      return (
        '<div class="test-skeleton shimmer">' +
          '<div class="skel-icon"></div>' +
          '<div class="skel-lines">' +
            '<div class="skel-line"></div>' +
            '<div class="skel-line short"></div>' +
          '</div>' +
        '</div>'
      );
    }).join('');
}

/* ════════════════════════════════════════════════
   🚀  INIT — levellarni API dan olib keladi
   ════════════════════════════════════════════════ */
async function init() {
  var username = localStorage.getItem("username");
  if (!username) {
    window.location.href = "../auth/login.html";
    return;
  }

  showLevelSkeletons();

  try {
    /*
      GET /api/levels
      Response: { "levels": [ {id, name, description}, ... ] }
    */
    var data = await apiFetch("/api/levels");
    if (!data) return;

    renderLevels(data.levels || []);

  } catch(err) {
    document.getElementById("levelList").innerHTML =
      '<div class="error-box">' +
        '<i class="fa fa-wifi"></i>' +
        'Serverga ulanib bo\'lmadi: ' + err.message + '<br>' +
        '<button class="retry-btn" onclick="init()">' +
          '<i class="fa fa-rotate-right"></i> Qayta urinish' +
        '</button>' +
      '</div>';
  }
}

/* PAGE LOADER */
window.addEventListener("load", function() {
  setTimeout(function() { document.getElementById("pageLoader").classList.add("hide"); }, 800);
});
function triggerLoad() {
  var l = document.getElementById("pageLoader");
  l.classList.remove("hide");
  setTimeout(function() { l.classList.add("hide"); }, 1100);
}

/* LOGOUT */
function openLogout()  { document.getElementById("logoutModal").classList.add("show"); }
function closeLogout() { document.getElementById("logoutModal").classList.remove("show"); }
function confirmLogout() { localStorage.clear(); window.location.href = "../auth/login.html"; }
document.getElementById("logoutModal").addEventListener("click", function(e) {
  if (e.target === document.getElementById("logoutModal")) closeLogout();
});

/* DARK MODE */
function toggleDark() {
  document.body.classList.toggle("dark");
  document.getElementById("darkIcon").className =
    document.body.classList.contains("dark") ? "fa fa-sun" : "fa fa-moon";
}

init();
</script>
