<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FR3D – Test</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#535da1;--secondary:#14B789;--bg:#f9f9f9;--dark:#000;--p:#717275;--border:#e9eaeb;--danger:#e74c3c;--warning:#ff9f43;--nav-width:240px;--radius:20px;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
body{background:var(--bg);color:var(--dark);min-height:100vh;}

/* PAGE LOADER */
.page-loader{position:fixed;inset:0;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
.page-loader.hide{opacity:0;pointer-events:none;}
.loader-logo{color:#fff;font-size:36px;font-weight:800;letter-spacing:3px;margin-bottom:28px;}
.loader-logo span{color:var(--secondary);}
.loader-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SIDEBAR */
.sidebar{display:none;}
@media(min-width:768px){
  .sidebar{display:flex;flex-direction:column;position:fixed;top:0;left:0;width:var(--nav-width);height:100vh;background:var(--primary);padding:28px 0;z-index:100;}
  .sidebar-logo{color:#fff;font-size:26px;font-weight:800;letter-spacing:2px;padding:0 28px 32px;border-bottom:1px solid rgba(255,255,255,.15);text-decoration:none;display:block;}
  .sidebar-logo span{color:var(--secondary);}
  .sidebar-nav{flex:1;padding:24px 0;display:flex;flex-direction:column;gap:4px;}
  .nav-item-side{display:flex;align-items:center;gap:14px;padding:13px 28px;color:rgba(255,255,255,.65);font-size:14px;font-weight:500;border-left:3px solid transparent;transition:all .2s;text-decoration:none;}
  .nav-item-side i{font-size:17px;width:20px;text-align:center;}
  .nav-item-side:hover{background:rgba(255,255,255,.08);color:#fff;}
  .nav-item-side.active{background:rgba(255,255,255,.12);color:#fff;border-left:3px solid var(--secondary);}
  .main-wrap{margin-left:var(--nav-width);}
}

/* TOPBAR */
.topbar{background:#fff;padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;gap:12px;}
.topbar-logo{color:var(--primary);font-weight:800;font-size:22px;letter-spacing:2px;text-decoration:none;}
.topbar-logo span{color:var(--secondary);}
@media(min-width:768px){.topbar-logo{display:none;}}
.topbar-title{font-size:15px;font-weight:700;display:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px;}
@media(min-width:768px){.topbar-title{display:block;}}
.topbar-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.action-btn{width:38px;height:38px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--p);transition:all .2s;font-size:15px;text-decoration:none;}
.action-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}

/* BOTTOM NAV — test paytida yashiriladi */
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;justify-content:space-around;padding:10px 0 14px;border-top:1px solid var(--border);z-index:100;transition:transform .3s,opacity .3s;}
.bottom-nav.hidden{transform:translateY(100%);opacity:0;pointer-events:none;}
@media(min-width:768px){.bottom-nav{display:none!important;}}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--p);padding:6px 18px;border-radius:12px;transition:all .2s;text-decoration:none;}
.nav-item i{font-size:20px;}
.nav-item.active{color:var(--primary);background:rgba(83,93,161,.08);}

/* PAGE */
.test-page{padding:24px 16px 40px;max-width:720px;}
@media(min-width:768px){.test-page{padding:28px 36px 60px;}}

/* ══════════════════════════════════
   QUIZ TOPBAR:  (1)(2)(3)     ⏱09:45
══════════════════════════════════ */
.quiz-topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:20px;
}

.q-dots{
  display:flex;
  gap:6px;
  flex:1;
  overflow-x:auto;
  overflow-y:hidden;
  flex-wrap:nowrap;
  scrollbar-width:none;
}

.q-dots::-webkit-scrollbar{
  display:none;
}.q-dot{
  width:32px;height:32px;border-radius:10px;
  background:#fff;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--p);
  cursor:pointer;transition:all .2s;flex-shrink:0;
}
.q-dot:hover{border-color:var(--primary);color:var(--primary);}
.q-dot.answered{background:rgba(83,93,161,.1);border-color:var(--primary);color:var(--primary);}
.q-dot.current{background:var(--primary);border-color:var(--primary);color:#fff;}

/* Timer — top right */
.timer-pill{
  display:flex;align-items:center;gap:6px;
  background:#fff;border:1.5px solid var(--border);
  border-radius:12px;padding:8px 14px;
  flex-shrink:0;transition:all .3s;
}
.timer-pill.warn{background:rgba(255,159,67,.1);border-color:var(--warning);}
.timer-pill.danger{background:rgba(231,76,60,.1);border-color:var(--danger);animation:pulse-b 1s ease infinite;}
@keyframes pulse-b{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.3)}50%{box-shadow:0 0 0 5px rgba(231,76,60,0)}}
.timer-pill i{font-size:13px;color:var(--p);}
.timer-pill.warn i{color:var(--warning);}
.timer-pill.danger i{color:var(--danger);}
.timer-val{font-size:17px;font-weight:800;letter-spacing:1px;font-variant-numeric:tabular-nums;color:var(--dark);}
.timer-pill.warn .timer-val{color:var(--warning);}
.timer-pill.danger .timer-val{color:var(--danger);}

/* QUESTION SLIDE */
.question-slide{display:none;animation:slideIn .3s cubic-bezier(.4,0,.2,1);}
.question-slide.active{display:block;}
@keyframes slideIn{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:translateX(0)}}

.question-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px 22px;}
@media(min-width:480px){.question-card{padding:30px 26px 24px;}}
.q-label{font-size:11px;font-weight:700;color:var(--secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.q-text{font-size:16px;font-weight:700;line-height:1.55;margin-bottom:22px;}
@media(min-width:480px){.q-text{font-size:18px;}}

.answers-grid{display:flex;flex-direction:column;gap:10px;}
.answer-btn{
  display:flex;align-items:center;gap:13px;
  padding:13px 16px;
  background:var(--bg);border:2px solid var(--border);border-radius:14px;
  cursor:pointer;text-align:left;width:100%;
  font-family:'Outfit',sans-serif;transition:all .2s;
}
.answer-btn:hover{border-color:var(--primary);background:rgba(83,93,161,.04);}
.answer-btn.selected{border-color:var(--primary);background:rgba(83,93,161,.08);}
.ans-letter{
  width:30px;height:30px;border-radius:9px;
  background:#fff;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--p);flex-shrink:0;transition:all .2s;
}
.answer-btn.selected .ans-letter{background:var(--primary);border-color:var(--primary);color:#fff;}
.ans-text{font-size:14px;font-weight:500;}

/* NAV BUTTONS */
.question-nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:10px;}
.nav-btn{padding:12px 24px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;display:flex;align-items:center;gap:8px;}
.btn-prev{background:#fff;border:1.5px solid var(--border)!important;color:var(--p);}
.btn-prev:disabled{opacity:.35;cursor:not-allowed;}
.btn-next{background:var(--primary);color:#fff;}
.btn-next:hover{background:#464f8e;}
.btn-submit-final{background:var(--secondary);color:#fff;}
.btn-submit-final:hover{background:#11966e;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:var(--radius);padding:32px 28px;width:90%;max-width:370px;text-align:center;transform:scale(.9);transition:transform .25s;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-overlay.show .modal{transform:scale(1);}
.modal-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px;background:rgba(255,159,67,.1);color:var(--warning);}
.modal h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.modal p{font-size:13px;color:var(--p);margin-bottom:24px;line-height:1.6;}
.modal-btns{display:flex;gap:10px;}
.modal-btns button{flex:1;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;}
.btn-cancel-m{background:var(--bg);border:1.5px solid var(--border)!important;color:var(--p);}
.btn-confirm{background:var(--secondary);color:#fff;}
.btn-confirm:hover{background:#11966e;}

/* RESULT */
.result-screen{display:none;}
.result-screen.show{display:block;animation:fadeUp .45s cubic-bezier(.4,0,.2,1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.result-hero{background:linear-gradient(135deg,var(--primary),#6b77c4);border-radius:var(--radius);padding:38px 24px;text-align:center;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;}
.result-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:rgba(255,255,255,.06);border-radius:50%;}
.result-hero::after{content:'';position:absolute;bottom:-50px;left:-30px;width:180px;height:180px;background:rgba(255,255,255,.04);border-radius:50%;}
.r-emoji{font-size:52px;display:block;margin-bottom:10px;position:relative;z-index:1;}
.r-score{font-size:60px;font-weight:800;line-height:1;position:relative;z-index:1;}
.r-score span{font-size:22px;opacity:.75;font-weight:500;}
.r-label{font-size:13px;opacity:.8;margin-top:4px;position:relative;z-index:1;}
.r-grade{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:5px 16px;font-size:13px;font-weight:700;margin-top:12px;position:relative;z-index:1;}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.r-stat{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center;}
.r-stat-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:15px;margin:0 auto 8px;}
.s-correct .r-stat-icon{background:rgba(20,183,137,.1);color:var(--secondary);}
.s-wrong   .r-stat-icon{background:rgba(231,76,60,.1);color:var(--danger);}
.s-time    .r-stat-icon{background:rgba(83,93,161,.1);color:var(--primary);}
.s-pct     .r-stat-icon{background:rgba(255,159,67,.1);color:var(--warning);}
.r-stat-num{font-size:24px;font-weight:800;}
.r-stat-lbl{font-size:11px;color:var(--p);margin-top:2px;font-weight:600;}
.result-detail{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.result-detail-title{padding:14px 18px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.rd-q-item{padding:14px 18px;border-bottom:1px solid var(--border);}
.rd-q-item:last-child{border-bottom:none;}
.rd-q-text{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.rd-a-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;margin-bottom:3px;font-size:12px;font-weight:500;}
.rd-a-row.chosen{background:rgba(83,93,161,.08);border:1.5px solid rgba(83,93,161,.2);color:var(--primary);}
.rd-a-row.other{opacity:.45;}
.result-actions{display:flex;gap:10px;flex-wrap:wrap;padding-bottom:80px;}
@media(min-width:768px){.result-actions{padding-bottom:0;}}
.result-actions button{flex:1;min-width:130px;padding:13px 18px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.btn-retry{background:#fff;border:1.5px solid var(--border)!important;color:var(--dark);}
.btn-retry:hover{background:var(--bg);}
.btn-menu-go{background:var(--primary);color:#fff;}
.btn-menu-go:hover{background:#464f8e;}

/* SKELETON */
.skel-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px;}
.skel-line{height:12px;background:#eee;border-radius:6px;margin-bottom:10px;}
.skel-ans{height:50px;background:#eee;border-radius:13px;margin-bottom:9px;}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:.4}}
.shimmer{animation:shimmer 1.2s ease infinite;}
.center-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;text-align:center;color:var(--p);gap:14px;}
.center-state i{font-size:40px;opacity:.3;}
.retry-state-btn{padding:10px 24px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;}

/* DARK */
body.dark{background:#0f0f14;color:#fff;--bg:#1a1a24;--border:#2a2a38;--dark:#fff;--p:#8888aa;}
body.dark .topbar,body.dark .question-card,body.dark .r-stat,body.dark .result-detail,body.dark .modal,body.dark .bottom-nav,body.dark .timer-pill,body.dark .q-dot{background:#1a1a24;border-color:#2a2a38;}
body.dark .answer-btn{background:#111118;border-color:#2a2a38;}
body.dark .answer-btn.selected{background:rgba(83,93,161,.15);border-color:var(--primary);}
body.dark .ans-letter{background:#1a1a24;border-color:#2a2a38;}
body.dark .sidebar{background:#12121c;}
body.dark .btn-prev{background:#111118;border-color:#2a2a38!important;color:#8888aa;}
body.dark .btn-cancel-m{background:#111118;border-color:#2a2a38!important;color:#8888aa;}
body.dark .btn-retry{background:#111118;border-color:#2a2a38!important;color:#fff;}
body.dark .action-btn{background:#111118;border-color:#2a2a38;color:#8888aa;}
body.dark .skel-line,body.dark .skel-ans{background:#2a2a38;}

/* RESULT RESPONSIVE FIX */
@media(max-width:480px){

.result-hero{
  padding:26px 16px;
}

.r-emoji{
  font-size:42px;
}

.r-score{
  font-size:42px;
}

.r-score span{
  font-size:16px;
}

.r-grade{
  font-size:12px;
  padding:4px 12px;
}

}
</style>
</head>
<body>

<div class="page-loader" id="pageLoader">
  <div class="loader-logo">FR<span>3D</span></div>
  <div class="loader-spinner"></div>
</div>

<div class="modal-overlay" id="submitModal">
  <div class="modal">
    <div class="modal-icon"><i class="fa fa-paper-plane"></i></div>
    <h3>Testni tugatish</h3>
    <p id="submitModalText">Topshirmoqchimisiz?</p>
    <div class="modal-btns">
      <button class="btn-cancel-m" onclick="closeModal()">Davom etish</button>
      <button class="btn-confirm"  onclick="doSubmit()">Topshirish</button>
    </div>
  </div>
</div>

<aside class="sidebar">
  <a href="dashboard.html" class="sidebar-logo">FR<span>3D</span></a>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item-side"><i class="fa fa-table-cells"></i> Dashboard</a>
    <a href="menu.html"      class="nav-item-side active"><i class="fa fa-layer-group"></i> Menu</a>
    <a href="profile.html"   class="nav-item-side"><i class="fa fa-user"></i> Profile</a>
    <a href="settings.html"  class="nav-item-side"><i class="fa fa-gear"></i> Settings</a>
  </nav>
</aside>

<div class="main-wrap">
  <div class="topbar">
    <a href="menu.html" class="topbar-logo">FR<span>3D</span></a>
    <div class="topbar-title" id="topbarTitle">Test yuklanmoqda...</div>
    <div class="topbar-actions">
      <div class="action-btn" onclick="toggleDark()"><i class="fa fa-moon" id="darkIcon"></i></div>
      <a href="menu.html" class="action-btn"><i class="fa fa-arrow-left"></i></a>
    </div>
  </div>

  <div class="test-page">

    <!-- LOADING -->
    <div id="loadingState">
      <div class="quiz-topbar" style="margin-bottom:20px;">
        <div style="display:flex;gap:6px;">
          <div style="width:32px;height:32px;border-radius:10px;background:#eee;" class="shimmer"></div>
          <div style="width:32px;height:32px;border-radius:10px;background:#eee;" class="shimmer"></div>
          <div style="width:32px;height:32px;border-radius:10px;background:#eee;" class="shimmer"></div>
          <div style="width:32px;height:32px;border-radius:10px;background:#eee;" class="shimmer"></div>
          <div style="width:32px;height:32px;border-radius:10px;background:#eee;" class="shimmer"></div>
        </div>
        <div style="width:90px;height:36px;border-radius:12px;background:#eee;" class="shimmer"></div>
      </div>
      <div class="skel-card shimmer">
        <div class="skel-line" style="width:30%;height:8px;"></div>
        <div class="skel-line" style="width:80%;height:15px;margin-top:14px;"></div>
        <div class="skel-line" style="width:60%;height:15px;"></div>
        <div style="margin-top:22px;">
          <div class="skel-ans"></div><div class="skel-ans"></div>
          <div class="skel-ans"></div><div class="skel-ans"></div>
        </div>
      </div>
    </div>

    <!-- ERROR -->
    <div id="errorState" style="display:none;">
      <div class="center-state">
        <i class="fa fa-triangle-exclamation"></i>
        <p id="errorMsg">Test yuklab bo'lmadi</p>
        <button class="retry-state-btn" onclick="loadTest()"><i class="fa fa-rotate-right"></i> Qayta urinish</button>
      </div>
    </div>

    <!-- TEST -->
    <div id="testContent" style="display:none;">

      <!-- (1)(2)(3)              ⏱ 09:45 -->
      <div class="quiz-topbar">
        <div class="q-dots" id="qDots"></div>
        <div class="timer-pill" id="timerPill">
          <i class="fa fa-clock"></i>
          <span class="timer-val" id="timerVal">10:00</span>
        </div>
      </div>

      <div id="questionSlides"></div>

      <div class="question-nav">
        <button class="nav-btn btn-prev" id="btnPrev" onclick="prevQ()" disabled>
          <i class="fa fa-arrow-left"></i> Orqaga
        </button>
        <button class="nav-btn btn-next" id="btnNext" onclick="nextQ()">
          Keyingi <i class="fa fa-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- RESULT -->
    <div class="result-screen" id="resultScreen">
      <div class="result-hero">
        <span class="r-emoji" id="rEmoji">🎉</span>
        <div class="r-score" id="rScore">0<span>/5</span></div>
        <div class="r-label">to'g'ri javob</div>
        <div class="r-grade" id="rGrade">A</div>
      </div>
      <div class="result-stats">
        <div class="r-stat s-correct"><div class="r-stat-icon"><i class="fa fa-check"></i></div><div class="r-stat-num" id="sCorrect">0</div><div class="r-stat-lbl">To'g'ri</div></div>
        <div class="r-stat s-wrong"><div class="r-stat-icon"><i class="fa fa-xmark"></i></div><div class="r-stat-num" id="sWrong">0</div><div class="r-stat-lbl">Noto'g'ri</div></div>
        <div class="r-stat s-time"><div class="r-stat-icon"><i class="fa fa-clock"></i></div><div class="r-stat-num" id="sTime">0:00</div><div class="r-stat-lbl">Vaqt</div></div>
        <div class="r-stat s-pct"><div class="r-stat-icon"><i class="fa fa-percent"></i></div><div class="r-stat-num" id="sPct">0%</div><div class="r-stat-lbl">Foiz</div></div>
      </div>
      <div class="result-detail">
        <div class="result-detail-title"><i class="fa fa-list-check" style="color:var(--secondary)"></i> Batafsil natija</div>
        <div id="detailList"></div>
      </div>
      <div class="result-actions">
        <button class="btn-retry"   onclick="retryTest()"><i class="fa fa-rotate-right"></i> Qayta yechish</button>
        <button class="btn-menu-go" onclick="goMenu()"><i class="fa fa-layer-group"></i> Menuga</button>
      </div>
    </div>

  </div>
</div>

<!-- BOTTOM NAV — test paytida yashiriladi -->
<nav class="bottom-nav" id="bottomNav">
  <a href="dashboard.html" class="nav-item"><i class="fa fa-table-cells"></i>Dashboard</a>
  <a href="menu.html"      class="nav-item active"><i class="fa fa-layer-group"></i>Menu</a>
  <a href="profile.html"   class="nav-item"><i class="fa fa-user"></i>Profile</a>
  <a href="settings.html"  class="nav-item"><i class="fa fa-gear"></i>Settings</a>
</nav>

<script>
var API_BASE="https://fr3dbg-production.up.railway.app";
var LETTERS=['A','B','C','D','E'];
var testId=null,testData=null,currentQ=0,userAnswers={},timerInt=null,elapsed=0,totalSec=0,finished=false;

async function apiFetch(path,opts){
  var h={"Content-Type":"application/json"};
  var t=localStorage.getItem("token");
  if(t) h["Authorization"]="Bearer "+t;
  var r=await fetch(API_BASE+path,Object.assign({headers:h},opts||{}));
  if(r.status===401){localStorage.clear();location.href="../auth/login.html";return null;}
  if(!r.ok) throw new Error((await r.text())||"Xatolik "+r.status);
  return r.json();
}

(function(){
  if(!localStorage.getItem("token")){location.href="../auth/login.html";return;}
  testId=new URLSearchParams(location.search).get("id");
  if(!testId){showError("Test ID topilmadi");return;}
  loadTest();
})();

async function loadTest(){
  show("loadingState");hide("errorState");hide("testContent");hideResult();
  // Test boshlanganda bottom nav yashir
  g("bottomNav").classList.add("hidden");
  try{
    var d=await apiFetch("/api/tests/"+testId);
    if(!d) return;
    testData=d;userAnswers={};currentQ=0;finished=false;
    g("topbarTitle").textContent=d.name||"Test";
    totalSec=(d.time||10)*60;elapsed=0;
    renderDots();renderQuestions();showQ(0);startTimer();
    hide("loadingState");show("testContent");
  }catch(e){
    g("bottomNav").classList.remove("hidden"); // xatolikda qaytaramiz
    showError("Test yuklab bo'lmadi: "+e.message);
  }
}

function renderDots(){
  var qs=testData.questions||[];
  g("qDots").innerHTML=qs.map(function(q,i){
    return '<div class="q-dot" id="dot-'+i+'" onclick="goToQ('+i+')">'+(i+1)+'</div>';
  }).join('');
}

function renderQuestions(){
  var qs=testData.questions||[];
  g("questionSlides").innerHTML=qs.map(function(q,qi){
    var aH=(q.answers||[]).map(function(a,ai){
      return '<button class="answer-btn" id="ans-'+q.id+'-'+a.id+'" onclick="pick('+q.id+','+a.id+','+qi+')">'+
        '<div class="ans-letter">'+(LETTERS[ai]||ai+1)+'</div>'+
        '<div class="ans-text">'+esc(a.text||a.answerText||'')+'</div></button>';
    }).join('');
    return '<div class="question-slide" id="slide-'+qi+'">'+
      '<div class="question-card">'+
        '<div class="q-label">Savol '+(qi+1)+' / '+qs.length+'</div>'+
        '<div class="q-text">'+esc(q.question||q.questionText||'')+'</div>'+
        '<div class="answers-grid">'+aH+'</div>'+
      '</div></div>';
  }).join('');
}

function showQ(i){
  var qs=testData.questions||[];
  if(i<0||i>=qs.length) return;
  document.querySelectorAll(".question-slide").forEach(function(s){s.classList.remove("active");});
  var s=g("slide-"+i);if(s) s.classList.add("active");
  currentQ=i;updateDots();updateNavBtns();
}

function updateDots(){
  var qs=testData.questions||[];
  qs.forEach(function(q,i){
    var d=g("dot-"+i);if(!d) return;
    d.className="q-dot";
    if(userAnswers[q.id]!==undefined) d.classList.add("answered");
    if(i===currentQ) d.classList.add("current");
  });
}

function updateNavBtns(){
  var qs=testData.questions||[];
  g("btnPrev").disabled=(currentQ===0);
  var nb=g("btnNext");
  if(currentQ===qs.length-1){
    nb.innerHTML='<i class="fa fa-paper-plane"></i> Topshirish';
    nb.className="nav-btn btn-submit-final";nb.onclick=openModal;
  } else {
    nb.innerHTML='Keyingi <i class="fa fa-arrow-right"></i>';
    nb.className="nav-btn btn-next";nb.onclick=nextQ;
  }
}

function pick(qId,aId,qi){
  if(finished) return;
  var qs=testData.questions||[];
  ((qs[qi]&&qs[qi].answers)||[]).forEach(function(a){
    var b=g("ans-"+qId+"-"+a.id);if(b) b.classList.remove("selected");
  });
  var ch=g("ans-"+qId+"-"+aId);if(ch) ch.classList.add("selected");
  userAnswers[qId]=aId;updateDots();
}

function nextQ(){var qs=testData.questions||[];if(currentQ<qs.length-1) showQ(currentQ+1);}
function prevQ(){if(currentQ>0) showQ(currentQ-1);}
function goToQ(i){showQ(i);}

function startTimer(){
  clearInterval(timerInt);elapsed=0;renderTimer();
  timerInt=setInterval(function(){
    elapsed++;var rem=totalSec-elapsed;
    renderTimer();
    var p=g("timerPill");p.className="timer-pill";
    if(rem<=0){clearInterval(timerInt);doSubmit();return;}
    if(rem<=60) p.classList.add("danger");
    else if(rem<=120) p.classList.add("warn");
  },1000);
}
function renderTimer(){
  var rem=Math.max(0,totalSec-elapsed);
  g("timerVal").textContent=pad(Math.floor(rem/60))+":"+pad(rem%60);
}

function openModal(){
  var qs=testData.questions||[];
  var una=qs.length-Object.keys(userAnswers).length;
  g("submitModalText").textContent=una>0
    ?una+" ta savolga javob bermagansiz. Baribir topshirmoqchimisiz?"
    :"Barcha "+qs.length+" ta savolga javob berdingiz. Topshirasizmi?";
  g("submitModal").classList.add("show");
}
function closeModal(){g("submitModal").classList.remove("show");}

async function doSubmit(){
  closeModal();if(finished) return;
  finished=true;clearInterval(timerInt);
  var answers=Object.keys(userAnswers).map(function(qId){
    return{questionId:parseInt(qId),answerId:userAnswers[qId]};
  });
  try{
    var res=await apiFetch("/api/tests/"+testId+"/submit",{method:"POST",body:JSON.stringify({answers:answers,timeSpent:elapsed})});
    if(!res) return;showResult(res);
  }catch(e){
    var qs=testData.questions||[];
    showResult({score:answers.length,total:qs.length,percentage:Math.round(answers.length/qs.length*100),timeSpent:elapsed});
  }
}

function showResult(r){
  hide("testContent");
  // Natija ekranida bottom nav qaytadi
  g("bottomNav").classList.remove("hidden");
  var rs=g("resultScreen");rs.style.display="block";
  setTimeout(function(){rs.classList.add("show");},10);
  var score=r.score||0,total=r.total||(testData.questions?testData.questions.length:0);
  var pct=r.percentage||Math.round(score/total*100)||0,time=r.timeSpent||elapsed;
  var emoji,grade;
  if(pct>=90){emoji="🏆";grade="A+";}else if(pct>=75){emoji="🎉";grade="A";}
  else if(pct>=60){emoji="👍";grade="B";}else if(pct>=45){emoji="😊";grade="C";}
  else{emoji="💪";grade="D";}
  g("rEmoji").textContent=emoji;
  g("rScore").innerHTML=score+'<span>/'+total+'</span>';
  g("rGrade").textContent=grade;
  g("sCorrect").textContent=score;g("sWrong").textContent=total-score;
  g("sPct").textContent=pct+"%";g("sTime").textContent=fmtT(time);
  buildDetail();
}

function buildDetail(){
  var qs=testData.questions||[];
  g("detailList").innerHTML=qs.map(function(q,qi){
    var chosen=userAnswers[q.id];
    var badge=chosen!==undefined
      ?'<span style="font-size:10px;background:rgba(83,93,161,.1);color:var(--primary);padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap;">Javob berildi</span>'
      :'<span style="font-size:10px;background:rgba(231,76,60,.1);color:var(--danger);padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap;">O\'tkazildi</span>';
    var aH=(q.answers||[]).map(function(a,ai){
      var isCh=(a.id===chosen);
      return '<div class="rd-a-row '+(isCh?"chosen":"other")+'">'+
        '<i class="fa '+(isCh?"fa-circle-dot":"fa-circle")+'" style="font-size:10px;'+(isCh?"color:var(--primary)":"")+';flex-shrink:0"></i>'+
        ' '+LETTERS[ai]+'. '+esc(a.text||a.answerText||'')+
      '</div>';
    }).join('');
    return '<div class="rd-q-item"><div class="rd-q-text"><span>'+(qi+1)+'. '+esc(q.question||q.questionText||'')+'</span>'+badge+'</div>'+aH+'</div>';
  }).join('');
}

function hideResult(){
  var rs=g("resultScreen");rs.classList.remove("show");rs.style.display="none";
}
function retryTest(){
  hideResult();
  g("bottomNav").classList.add("hidden");
  loadTest();
}
function goMenu(){location.href="menu.html";}

function g(id){return document.getElementById(id);}
function show(id){g(id).style.display="block";}
function hide(id){g(id).style.display="none";}
function pad(n){return String(n).padStart(2,"0");}
function fmtT(s){return Math.floor(s/60)+":"+pad(s%60);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function showError(msg){g("errorMsg").textContent=msg;hide("loadingState");hide("testContent");hideResult();show("errorState");}

window.addEventListener("load",function(){setTimeout(function(){g("pageLoader").classList.add("hide");},700);});
function toggleDark(){document.body.classList.toggle("dark");g("darkIcon").className=document.body.classList.contains("dark")?"fa fa-sun":"fa fa-moon";}
window.addEventListener("beforeunload",function(e){if(!finished&&testData&&Object.keys(userAnswers).length>0){e.preventDefault();e.returnValue="";}});
</script>
</body>
</html>
